name: Python package

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.8]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install .
        echo "NUMBA_DISABLE_JIT=1" >> $GITHUB_ENV

    - name: Notify Slack

      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: general
        SLACK_USERNAME: Travis CI
        SLACK_ICON: https://avatars.githubusercontent.com/u/14946106?s=200&v=4
        SLACK_COLOR: ${{ job.status }}
        SLACK_TITLE: Job ${{ job.status }} for ${{ github.repository }}
        SLACK_MESSAGE: Check run ${{ github.run_id }} on ${{ github.ref }}